<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { width: 340px; padding: 15px; font-family: 'Segoe UI', system-ui, sans-serif; background: #0d0d0d; color: #ececec; margin: 0; }
        h2 { margin-top: 0; color: #00ffcc; font-size: 16px; border-bottom: 1px solid #222; padding-bottom: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .session-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; margin-bottom: 8px; background: #1a1a1a; border-radius: 6px; border: 1px solid #333; font-size: 14px; transition: 0.2s; }
        .session-item:hover { background: #252525; border-color: #00ffcc; }
        .session-name { font-weight: 500; }
        .delete-btn { background: none; border: none; color: #ff4444; cursor: pointer; font-size: 14px; opacity: 0.6; transition: 0.2s; padding: 4px; }
        .delete-btn:hover { opacity: 1; transform: scale(1.1); }
        .hint-box { background: #111; border-left: 3px solid #00ffcc; padding: 12px; margin-top: 20px; font-size: 12px; color: #aaa; border-radius: 0 4px 4px 0; line-height: 1.5; }
        code { color: #00ffcc; font-weight: bold; background: #222; padding: 2px 5px; border-radius: 3px; font-family: monospace; }
    </style>
</head>
<body>
    <h2>🧠 Cortex Memory Banks</h2>
    <div id="sessionList">Initializing connection...</div>
    
    <div class="hint-box">
        <b>Pro Commands:</b><br>
        <code>@session Name!</code> Start recording project.<br>
        <code>@load Name!</code> Grab project history.<br>
        <code>@ask Name > query?</code> Load history + new prompt.<br>
    </div>

    <script src="popup.js"></script>
</body>
</html>
